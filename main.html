<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launcher Carrusel</title>
    
    <!-- Importa el CSS de Slick -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css"/>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }

        .event-banner {
            width: 555px;
            height: 385px;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slick-slider { 
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slick-slide {
            list-style: none;
            width: 100%;
            height: 100%;
        }

        .slick-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;    
        }
    </style>
</head>
<body> 

    <div class="fondo"> 
        <div class="event-banner">
            <div id="slider" class="slick-slider">
                <div><a href="#"><img src="banner1.bmp" alt="Banner 1"></a></div>
            </div>
        </div>
    </div>

    <!-- Importa jQuery y Slick -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#slider').slick({
                infinite: true,
                slidesToShow: 1,
                slidesToScroll: 1,
                autoplay: true,
                autoplaySpeed: 3000,
                pauseOnHover: true,
                arrows: false,
                dots: false,
                speed: 1000,
            });
        });
    </script>

</body>
</html>
